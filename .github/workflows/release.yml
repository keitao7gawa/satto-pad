name: Release DMG

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and publish DMG
    runs-on: macos-15
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[release]')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Resolve next version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          latest_tag="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)"

          if [[ -z "$latest_tag" ]]; then
            project_version="$(scripts/read-version.sh)"
            next_version="$project_version"
          else
            version="${latest_tag#v}"
            IFS='.' read -r major minor patch <<< "$version"
            next_version="$major.$minor.$((patch + 1))"
          fi

          tag="v$next_version"

          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag already exists: $tag" >&2
            exit 1
          fi

          {
            echo "version=$next_version"
            echo "tag=$tag"
          } >> "$GITHUB_OUTPUT"

      - name: Build app
        shell: bash
        run: |
          scripts/build-release.sh
        env:
          VERSION: ${{ steps.version.outputs.version }}
          BUILD_NUMBER: ${{ github.run_number }}

      - name: Create DMG
        shell: bash
        run: |
          scripts/create-dmg.sh build/release/SattoPad.app build/release/SattoPad.dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: SattoPad ${{ steps.version.outputs.version }}
          files: build/release/SattoPad.dmg
          generate_release_notes: true
